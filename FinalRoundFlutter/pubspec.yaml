name: final_round
description: "FinalRound - AI-Powered Interview Prep"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  smooth_page_indicator: ^1.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Supabase
  supabase_flutter: ^2.3.0
  
  # Networking
  dio: ^5.4.0
  http: ^1.2.0
  
  # Camera & Audio
  camera: ^0.11.0
  flutter_sound: ^9.16.3
  audioplayers: ^6.0.0
  permission_handler: ^11.3.1
  
  # ML Kit for face detection (eye contact)
  google_mlkit_face_detection: ^0.12.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.66.0
  
  # Image handling
  image_picker: ^1.0.7
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.0
  url_launcher: ^6.2.3
  path_provider: ^2.1.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/animations/
    - assets/images/
  
  fonts:
    - family: Nohemi
      fonts:
        - asset: assets/fonts/Nohemi-Regular.otf
        - asset: assets/fonts/Nohemi-Medium.otf
          weight: 500
        - asset: assets/fonts/Nohemi-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Nohemi-Bold.otf
          weight: 700
        - asset: assets/fonts/Nohemi-ExtraBold.otf
          weight: 800
