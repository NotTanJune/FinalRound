<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - FinalRound</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 50px auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0F8A4A; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reset Your Password</h1>
        <input type="password" id="password" placeholder="New password" required>
        <input type="password" id="confirm" placeholder="Confirm password" required>
        <button onclick="resetPassword()">Reset Password</button>
        <p id="message"></p>
    </div>

    <script>
        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const message = document.getElementById('message');

            if (password !== confirm) {
                message.textContent = 'Passwords do not match';
                return;
            }

            // Extract token from URL
            const token = new URLSearchParams(window.location.search).get('token');
            
            if (!token) {
                message.textContent = 'Invalid reset link';
                return;
            }

            try {
                // Supabase handles password reset via the access_token in the URL fragment
                // The token from Supabase magic link is already authenticated
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                const accessToken = params.get('access_token') || token;
                
                // Use Supabase JS client approach - redirect to app with success
                // The password update happens via Supabase's built-in flow
                const response = await fetch('https://YOUR_SUPABASE_PROJECT.supabase.co/auth/v1/user', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + accessToken,
                        'apikey': 'YOUR_ANON_KEY' // Replace with your anon key when deploying
                    },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    message.textContent = 'Password reset successfully! You can now sign in.';
                    message.style.color = 'green';
                } else {
                    message.textContent = 'Failed to reset password';
                }
            } catch (error) {
                message.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
